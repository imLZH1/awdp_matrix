<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWDP Admin 控制台</title>
    <link rel="stylesheet" href="/static/css/element-plus.css" />
    <script src="/static/js/vue.global.js"></script>
    <script src="/static/js/element-plus.js"></script>
    <script src="/static/js/axios.min.js"></script>
    <style>
        :root {
            --primary-bg: #0f172a;
            --sidebar-bg: #1e293b;
            --accent-color: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 70%);
            min-height: 100vh;
        }

        #app {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 260px;
            background-color: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 15px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .brand {
            padding: 25px 20px;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .nav-menu {
            list-style: none;
            padding: 20px 0;
            margin: 0;
        }

        .nav-item {
            padding: 15px 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            color: var(--text-muted);
        }

        .nav-item:hover, .nav-item.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.1) 0%, transparent 100%);
            border-left-color: var(--accent-color);
            color: var(--text-main);
        }

        .nav-item svg {
            opacity: 0.7;
        }
        .nav-item:hover svg, .nav-item.active svg {
            opacity: 1;
            stroke: var(--accent-color);
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        /* Element Plus Dark Theme Overrides */
        .el-card {
            background-color: rgba(30, 41, 59, 0.7) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 12px !important;
            color: var(--text-main) !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3) !important;
        }
        
        .el-card__header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
            padding: 20px !important;
        }

        /* Table Styling */
        .el-table {
            background-color: transparent !important;
            color: var(--text-main) !important;
            --el-table-border-color: rgba(255,255,255,0.05);
            --el-table-header-bg-color: rgba(15, 23, 42, 0.6);
            --el-table-row-hover-bg-color: rgba(59, 130, 246, 0.1);
            --el-table-tr-bg-color: transparent;
        }
        .el-table th.el-table__cell {
            background-color: rgba(15, 23, 42, 0.6) !important;
            color: #94a3b8 !important;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.05) !important;
        }
        .el-table td.el-table__cell {
            border-bottom: 1px solid rgba(255,255,255,0.05) !important;
            background-color: transparent !important;
        }
        /* 强制覆盖 element-plus 的内部行背景色和 hover 颜色 */
        .el-table tr {
            background-color: transparent !important;
        }
        .el-table--enable-row-hover .el-table__body tr:hover > td.el-table__cell {
            background-color: rgba(59, 130, 246, 0.1) !important;
        }

        /* Form Styling */
        .el-form-item__label {
            color: var(--text-muted) !important;
            font-weight: 500;
        }
        .el-input__wrapper, .el-textarea__wrapper {
            background-color: rgba(15, 23, 42, 0.6) !important;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.1) inset !important;
        }
        .el-input__inner, .el-textarea__inner {
            color: var(--text-main) !important;
        }

        /* Login Screen */
        .login-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .login-card {
            width: 420px;
            background: #ffffff !important;
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }
        .page-title {
            margin: 0;
            font-size: 24px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 状态卡片 */
        .status-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: var(--card-shadow);
        }
        .stat-title { color: var(--text-muted); font-size: 14px; }
        .stat-value { font-size: 28px; font-weight: bold; color: var(--text-main); }
        .stat-value.running { color: var(--success); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="app">
        <!-- 管理员登录 -->
        <div v-if="!token" class="login-wrapper">
            <el-card class="login-card">
                <template #header>
                    <div style="text-align: center;">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom: 10px;">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 17L12 22L22 17" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 12L12 17L22 12" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <div style="font-size: 20px; font-weight: bold; color: var(--text-main); letter-spacing: 2px;">MATRIX ADMIN</div>
                        <div style="font-size: 12px; color: #64748b; margin-top: 5px;">安全演练管理中枢</div>
                    </div>
                </template>
                <el-form :model="loginForm" label-position="top">
                    <el-form-item label="ADMIN ACCOUNT">
                        <el-input v-model="loginForm.username" placeholder="Enter Admin Username" size="large">
                            <template #prefix>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            </template>
                        </el-input>
                    </el-form-item>
                    <el-form-item label="SECURITY KEY">
                        <el-input type="password" v-model="loginForm.password" placeholder="Enter Admin Password" size="large" show-password>
                            <template #prefix>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            </template>
                        </el-input>
                    </el-form-item>
                    <el-button type="primary" style="width: 100%; margin-top: 15px;" size="large" color="#3b82f6" @click="doLogin">INITIALIZE ACCESS</el-button>
                </el-form>
            </el-card>
        </div>

        <!-- 管理后台界面 -->
        <template v-else>
            <div class="sidebar">
                <div class="brand">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <defs>
                            <linearGradient id="paint0_linear" x1="2" y1="7" x2="22" y2="7" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#60a5fa"/>
                                <stop offset="1" stop-color="#a78bfa"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    AWDP ADMIN
                </div>
                <ul class="nav-menu">
                    <li class="nav-item" :class="{active: currentTab === 'dashboard'}" @click="currentTab = 'dashboard'">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                        比赛控制
                    </li>
                    <li class="nav-item" :class="{active: currentTab === 'teams'}" @click="currentTab = 'teams'">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        队伍管理
                    </li>
                    <li class="nav-item" :class="{active: currentTab === 'challenges'}" @click="currentTab = 'challenges'">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
                        赛题配置
                    </li>
                    <li class="nav-item" :class="{active: currentTab === 'containers'}" @click="currentTab = 'containers'">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                        容器监控
                    </li>
                    <li class="nav-item" :class="{active: currentTab === 'announcements'}" @click="currentTab = 'announcements'">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                        公告管理
                    </li>
                    <li class="nav-item" :class="{active: currentTab === 'audit'}" @click="currentTab = 'audit'">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        审计日志
                    </li>
                    <li class="nav-item" :class="{active: currentTab === 'settings'}" @click="currentTab = 'settings'">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                        系统设置
                    </li>
                </ul>
                <div style="margin-top: auto; padding: 20px;">
                    <el-button type="danger" plain style="width: 100%; background: transparent; border-color: rgba(239,68,68,0.3);" @click="logout">安全登出</el-button>
                </div>
            </div>

            <div class="main-content">
                <!-- 顶部 Page Header -->
                <div class="page-header">
                    <h2 class="page-title">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"></path><path d="M18 20V4"></path><path d="M6 20v-4"></path></svg>
                        {{ currentTab === 'dashboard' ? 'GLOBAL CONTROL' : 
                           currentTab === 'teams' ? 'TEAM MANAGEMENT' : 
                           currentTab === 'challenges' ? 'CHALLENGE CONFIG' : 
                           currentTab === 'containers' ? 'CONTAINER MATRIX' : 'AUDIT LOGS' }}
                    </h2>
                    <el-tag :type="sysStatus.status === 'running' ? 'success' : (sysStatus.status === 'paused' ? 'warning' : 'info')" effect="dark">
                        SYSTEM: {{ sysStatus.status.toUpperCase() }}
                    </el-tag>
                </div>

                <!-- 仪表盘 (比赛控制) -->
                <div v-if="currentTab === 'dashboard'">
                    <div class="status-panel">
                        <div class="stat-card">
                            <span class="stat-title">CURRENT ROUND</span>
                            <span class="stat-value" :class="{running: sysStatus.status === 'running'}">
                                {{ sysStatus.current_round === 'Ended' ? 'Ended' : 'Round ' + (sysStatus.current_round || 0) }}
                            </span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-title">REMAINING TIME</span>
                            <span class="stat-value" style="color: #60a5fa;">{{ sysStatus.remaining_time || '00:00:00' }}</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-title">ACTIVE TEAMS</span>
                            <span class="stat-value" style="color: #a78bfa;">{{ teams.length || 0 }}</span>
                        </div>
                    </div>

                    <el-card>
                        <template #header>
                            <div style="font-weight: bold; color: #60a5fa;">比赛参数配置</div>
                        </template>
                        <el-form :model="gameConfig" label-width="120px" label-position="left">
                            <el-form-item label="比赛名称">
                                <el-input v-model="gameConfig.name" placeholder="例如: 2024 攻防锦标赛"></el-input>
                            </el-form-item>
                            
                            <!-- 模式切换 -->
                            <el-form-item label="比赛模式">
                                <el-radio-group v-model="gameConfig.game_mode">
                                    <el-radio label="awdp" border>AWDP 攻防模式</el-radio>
                                    <el-radio label="ctf" border>CTF 解题模式</el-radio>
                                </el-radio-group>
                            </el-form-item>
                            
                            <!-- CTF 独有配置 -->
                            <el-form-item v-if="gameConfig.game_mode === 'ctf'" label="计分规则">
                                <el-radio-group v-model="gameConfig.ctf_scoring_type">
                                    <el-radio label="static">静态固定分</el-radio>
                                    <el-radio label="dynamic">动态衰减分</el-radio>
                                </el-radio-group>
                            </el-form-item>

                            <el-row :gutter="20">
                                <el-col :span="12">
                                    <el-form-item label="开始时间">
                                        <el-date-picker v-model="gameConfig.start_time" type="datetime" placeholder="选择开始时间" value-format="YYYY-MM-DDTHH:mm:ss" style="width: 100%;"></el-date-picker>
                                    </el-form-item>
                                </el-col>
                                <el-col :span="12">
                                    <el-form-item label="结束时间">
                                        <el-date-picker v-model="gameConfig.end_time" type="datetime" placeholder="选择结束时间" value-format="YYYY-MM-DDTHH:mm:ss" style="width: 100%;"></el-date-picker>
                                    </el-form-item>
                                </el-col>
                            </el-row>
                            
                            <!-- AWDP 独有配置 -->
                            <el-form-item v-if="gameConfig.game_mode === 'awdp'" label="单轮时长(分钟)">
                                <el-input-number v-model="gameConfig.round_duration" :min="1" :max="60"></el-input-number>
                            </el-form-item>
                            
                            <el-form-item>
                                <el-button type="primary" color="#3b82f6" @click="saveGameConfig">保存参数配置</el-button>
                            </el-form-item>
                        </el-form>
                        
                        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
                            <div style="font-weight: bold; color: #ef4444; margin-bottom: 15px;">生命周期覆写 (Override)</div>
                            <div style="display: flex; gap: 15px; align-items: center;">
                                <el-button type="success" color="#22c55e" style="color: #000;" :disabled="sysStatus.status === 'running'" @click="controlGame('start')">LAUNCH MATRIX</el-button>
                                <el-button type="warning" color="#f59e0b" style="color: #000;" :disabled="sysStatus.status !== 'running'" @click="controlGame('pause')">PAUSE ROUTINE</el-button>
                                <el-button type="danger" color="#ef4444" style="color: #fff;" :disabled="sysStatus.status === 'finished'" @click="controlGame('stop')">TERMINATE GAME</el-button>
                                <el-button type="info" color="#475569" style="color: #fff; margin-left: 20px;" @click="resetGame">RESET GAME DATA</el-button>
                            </div>
                        </div>
                    </el-card>
                </div>

                <!-- 队伍管理 -->
                <div v-if="currentTab === 'teams'">
                    <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
                        <el-button type="primary" color="#3b82f6" @click="showTeamModal = true">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 5px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            生成新队伍
                        </el-button>
                    </div>
                    
                    <el-card>
                        <el-table :data="teams" style="width: 100%">
                            <el-table-column prop="id" label="TEAM ID" width="100"></el-table-column>
                            <el-table-column prop="name" label="队伍名称">
                                <template #default="scope">
                                    <div style="display: flex; align-items: center; gap: 10px;">
                                        <img v-if="scope.row.avatar_url" :src="scope.row.avatar_url" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover;" />
                                        <svg v-else width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity: 0.5;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                        {{ scope.row.name }}
                                    </div>
                                </template>
                            </el-table-column>
                            <el-table-column prop="total_score" label="当前总分" width="150">
                                <template #default="scope">
                                    <span style="color: #f59e0b; font-weight: bold;">{{ scope.row.total_score }} PT</span>
                                </template>
                            </el-table-column>
                            <el-table-column label="操作" width="160" align="right">
                                <template #default="scope">
                                    <el-button size="small" type="primary" plain style="background: transparent;" @click="editTeam(scope.row)">编辑</el-button>
                                    <el-button size="small" type="danger" plain style="background: transparent; border-color: rgba(239,68,68,0.3);" @click="deleteTeam(scope.row.id)">删除</el-button>
                                </template>
                            </el-table-column>
                        </el-table>
                    </el-card>
                </div>

                <!-- 赛题管理 -->
                <div v-if="currentTab === 'challenges'">
                    <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
                        <el-button type="primary" color="#3b82f6" @click="showChalModal = true">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 5px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            创建赛题
                        </el-button>
                    </div>
                    
                    <el-card>
                        <el-table :data="challenges" style="width: 100%">
                            <el-table-column prop="id" label="CHAL ID" width="100"></el-table-column>
                            <el-table-column prop="name" label="题目名称" width="200">
                                <template #default="scope">
                                    <span style="color: #60a5fa; font-weight: bold;">{{ scope.row.name }}</span>

    <script>
        const { createApp, ref, onMounted, watch, onUnmounted } = Vue;
        const { ElMessage } = ElementPlus;

        const app = createApp({
            setup() {
                const token = ref(localStorage.getItem('admin_token') || '');
                const currentTab = ref('dashboard');
                const loginForm = ref({ username: 'admin', password: 'admin' });
                
                const sysStatus = ref({ is_running: false, status: 'pending' });
                const gameConfig = ref({ name: 'AWDP Championship', start_time: null, end_time: null, round_duration: 5, status: 'pending', game_mode: 'awdp', ctf_scoring_type: 'dynamic' });

                const teams = ref([]);
                const showTeamModal = ref(false);
                const isEditingTeam = ref(false);
                const editingTeamId = ref(null);
                const newTeam = ref({ name: '', password: '', avatar_url: '' });

                const challenges = ref([]);
        const showChalModal = ref(false);
        const isEditingChal = ref(false);
        const editingChalId = ref(null);
        const newChal = ref({ name: '', description: '', category: 'web', chal_type: 'awdp', attachment_url: '', attack_image: '', check_image: '', base_score: 500, min_score: 100, initial_defense_count: 10 });

        const containers = ref([]);
                const auditTab = ref('scores');
                const scoreLogs = ref([]);
                const flagLogs = ref([]);
                
                const adminPasswordForm = ref({ old_password: '', new_password: '', confirm_password: '' });
                
                const announcements = ref([]);
                const showAnnModal = ref(false);
                const isEditingAnn = ref(false);
                const editingAnnId = ref(null);
                const newAnn = ref({ title: '', content: '', is_visible: true });

                const api = axios.create({ baseURL: '/api/v1' });

                api.interceptors.request.use(config => {
                    if (token.value) {
                        config.headers.Authorization = `Bearer ${token.value}`;
                    }
                    return config;
                });

                const doLogin = async () => {
                    try {
                        const payload = {
                            username: loginForm.value.username,
                            password: loginForm.value.password
                        };
                        const res = await api.post('/login', payload);
                        
                        if (!res.data.is_admin) {
                            ElMessage.error('ACCESS DENIED: 权限不足，非管理员账号');
                            return;
                        }
                        
                        token.value = res.data.access_token;
                        localStorage.setItem('admin_token', token.value);
                        ElMessage({ message: 'ADMIN ACCESS GRANTED', type: 'success', customClass: 'dark-toast' });
                        fetchData();
                        startStatusPolling();
                    } catch (err) {
                        ElMessage.error('ACCESS DENIED: 凭证无效');
                    }
                };

                const logout = () => {
                    token.value = '';
                    localStorage.removeItem('admin_token');
                };

                // 当比赛模式改变时，同步更新 newChal 的默认选项
                watch(() => gameConfig.value.game_mode, (newMode) => {
                    if (newMode === 'awdp') {
                        newChal.value.chal_type = 'awdp';
                    } else if (newMode === 'ctf' && newChal.value.chal_type === 'awdp') {
                        newChal.value.chal_type = 'ctf_docker';
                    }
                });

                const fetchData = async () => {
                    if (currentTab.value === 'dashboard') {
                        api.get('/admin/status').then(res => {
                            sysStatus.value = res.data;
                            // 当获取到最新状态后，如果本地倒计时未启动，则启动它
                            startLocalCountdown();
                        }).catch(()=>logout());
                        api.get('/admin/game/config').then(res => {
                            if (res.data) {
                                // 移除后端的时区信息以便于前端组件正常解析
                                if (res.data.start_time) res.data.start_time = res.data.start_time.split('.')[0].replace(/(\+|-)\d{2}:\d{2}$/, '').replace('Z', '');
                                if (res.data.end_time) res.data.end_time = res.data.end_time.split('.')[0].replace(/(\+|-)\d{2}:\d{2}$/, '').replace('Z', '');
                                gameConfig.value = res.data;
                                
                                // 初始化表单的 chal_type，以防在初始加载时 game_mode 就是 ctf 但表单还是 awdp
                                if (gameConfig.value.game_mode === 'awdp') {
                                    newChal.value.chal_type = 'awdp';
                                } else if (gameConfig.value.game_mode === 'ctf' && newChal.value.chal_type === 'awdp') {
                                    newChal.value.chal_type = 'ctf_docker';
                                }
                            }
                        });
                        api.get('/admin/teams').then(res => {
                            // 计算激活队伍数量
                            activeTeamsCount.value = res.data.length;
                        });
                    } else if (currentTab.value === 'teams') {
                        api.get('/admin/teams').then(res => teams.value = res.data);
                    } else if (currentTab.value === 'challenges') {
                        api.get('/admin/challenges').then(res => challenges.value = res.data);
                    } else if (currentTab.value === 'containers') {
                        api.get('/admin/containers').then(res => containers.value = res.data);
                    } else if (currentTab.value === 'audit') {
                        api.get('/admin/logs/scores').then(res => scoreLogs.value = res.data);
                        api.get('/admin/logs/flags').then(res => flagLogs.value = res.data);
                    } else if (currentTab.value === 'announcements') {
                        api.get('/admin/announcements').then(res => announcements.value = res.data);
                    }
                };

                watch(currentTab, () => {
                    if (token.value) fetchData();
                });

                // Fetch System Status recursively
                let statusTimer = null;
                const startStatusPolling = () => {
                    if (statusTimer) clearInterval(statusTimer);
                    statusTimer = setInterval(() => {
                        if (token.value && currentTab.value === 'dashboard') {
                            api.get('/admin/status').then(res => {
                                sysStatus.value = res.data;
                            }).catch(() => {});
                        }
                    }, 5000); // 降低请求频率，每 5 秒同步一次服务器时间，避免后端压力过大
                };

                // 前端基于获取到的数据每秒自己倒计时，减少对服务器的请求
                let localCountdownTimer = null;
                const startLocalCountdown = () => {
                    if (localCountdownTimer) clearInterval(localCountdownTimer);
                    localCountdownTimer = setInterval(() => {
                        if (sysStatus.value && sysStatus.value.remaining_time && sysStatus.value.remaining_time !== "00:00:00") {
                            let timeStr = sysStatus.value.remaining_time;
                            let isNegative = timeStr.startsWith('-');
                            if (isNegative) timeStr = timeStr.substring(1);
                            
                            let parts = timeStr.split(':');
                            if (parts.length === 3) {
                                let h = parseInt(parts[0], 10);
                                let m = parseInt(parts[1], 10);
                                let s = parseInt(parts[2], 10);
                                let totalSeconds = h * 3600 + m * 60 + s;
                                
                                if (isNegative) {
                                    // 如果是负数（比赛还没开始），时间应该越来越接近 0，也就是秒数减少
                                    totalSeconds--;
                                    if (totalSeconds <= 0) {
                                        // 倒计时结束，比赛开始，这里为了简单直接重新 fetch 一次状态
                                        fetchData();
                                        return;
                                    }
                                } else {
                                    // 比赛进行中，剩余时间减少
                                    if (totalSeconds > 0) {
                                        totalSeconds--;
                                    } else {
                                        fetchData();
                                        return;
                                    }
                                }
                                
                                let newH = Math.floor(totalSeconds / 3600);
                                let newM = Math.floor((totalSeconds % 3600) / 60);
                                let newS = totalSeconds % 60;
                                
                                let newTimeStr = 
                                    String(newH).padStart(2, '0') + ':' + 
                                    String(newM).padStart(2, '0') + ':' + 
                                    String(newS).padStart(2, '0');
                                    
                                sysStatus.value.remaining_time = isNegative ? '-' + newTimeStr : newTimeStr;
                            }
                        }
                    }, 1000);
                };

                onMounted(() => {
                    if (token.value) {
                        fetchData();
                        startStatusPolling();
                        startLocalCountdown();
                    }
                });

                onUnmounted(() => {
                    if (statusTimer) clearInterval(statusTimer);
                    if (localCountdownTimer) clearInterval(localCountdownTimer);
                });

                // Team methods
                const editTeam = (team) => {
                    isEditingTeam.value = true;
                    editingTeamId.value = team.id;
                    newTeam.value = { name: team.name, password: '', avatar_url: team.avatar_url || '' };
                    showTeamModal.value = true;
                };

                const handleTeamAvatarSuccess = (res) => {
                    newTeam.value.avatar_url = res.avatar_url;
                    ElMessage.success('队伍头像上传成功');
                };

                const handleTeamAvatarError = () => {
                    ElMessage.error('队伍头像上传失败');
                };

                const createTeam = async () => {
                    try {
                        await api.post('/admin/teams', newTeam.value);
                        ElMessage.success('队伍生成成功');
                        showTeamModal.value = false;
                        fetchData();
                    } catch (e) { ElMessage.error('创建失败'); }
                };
                const saveTeam = async () => {
                    try {
                        if (isEditingTeam.value) {
                            await api.put(`/admin/teams/${editingTeamId.value}`, { password: newTeam.value.password || null, avatar_url: newTeam.value.avatar_url });
                            ElMessage.success('队伍更新成功');
                        } else {
                            await api.post('/admin/teams', newTeam.value);
                            ElMessage.success('队伍生成成功');
                        }
                        showTeamModal.value = false;
                        fetchData();
                    } catch (e) { ElMessage.error(isEditingTeam.value ? '更新失败' : '创建失败'); }
                };
                
                const deleteTeam = async (id) => {
                    try {
                        await api.delete(`/admin/teams/${id}`);
                        ElMessage.success('删除成功');
                        fetchData();
                    } catch (e) { ElMessage.error('删除失败'); }
                };

                // Chal methods
                const editChal = (chal) => {
                    isEditingChal.value = true;
                    editingChalId.value = chal.id;
                    // Populate form with existing data
                    newChal.value = {
                        name: chal.name,
                        description: chal.description,
                        category: chal.category || 'web',
                        chal_type: chal.chal_type || 'awdp',
                        attachment_url: chal.attachment_url || '',
                        attack_image: chal.attack_image || '',
                        check_image: chal.check_image || '',
                        base_score: chal.base_score || 500,
                        min_score: chal.min_score || 100,
                        initial_defense_count: chal.initial_defense_count || 10
                    };
                    showChalModal.value = true;
                };

                const saveChal = async () => {
                    try {
                        if (isEditingChal.value) {
                            await api.put(`/admin/challenges/${editingChalId.value}`, newChal.value);
                            ElMessage.success('赛题修改成功');
                        } else {
                            // 如果当前比赛是 AWDP 模式，强制将题目的类型设为 awdp
                            if (gameConfig.value.game_mode === 'awdp') {
                                newChal.value.chal_type = 'awdp';
                            }
                            await api.post('/admin/challenges', newChal.value);
                            ElMessage.success('赛题创建成功');
                        }
                        
                        showChalModal.value = false;
                        handleClose(); // Reset form
                        fetchData();
                    } catch (e) { ElMessage.error(isEditingChal.value ? '修改失败' : '创建失败'); }
                };
                
                const handleAttachmentSuccess = (res) => {
                    newChal.value.attachment_url = res.url;
                    ElMessage.success('附件上传成功');
                };

                const handleAttachmentError = () => {
                    ElMessage.error('附件上传失败');
                };

                const toggleVisibility = async (chal) => {
                    try {
                        await api.put(`/admin/challenges/${chal.id}`, { is_visible: chal.is_visible });
                        ElMessage.success(`题目已${chal.is_visible ? '显示' : '隐藏'}`);
                    } catch (e) { 
                        ElMessage.error('可见性修改失败');
                        chal.is_visible = !chal.is_visible; // Revert on failure
                    }
                };
                const deleteChal = async (id) => {
                    try {
                        await api.delete(`/admin/challenges/${id}`);
                        ElMessage.success('删除成功');
                        fetchData();
                    } catch (e) { ElMessage.error('删除失败'); }
                };

                // Game Control
                const saveGameConfig = async () => {
                    try {
                        const payload = {
                            name: gameConfig.value.name,
                            start_time: gameConfig.value.start_time || null,
                            end_time: gameConfig.value.end_time || null,
                            round_duration: gameConfig.value.round_duration,
                            status: gameConfig.value.status,
                            game_mode: gameConfig.value.game_mode,
                            ctf_scoring_type: gameConfig.value.ctf_scoring_type
                        };
                        const res = await api.post('/admin/game/config', payload);
                        ElMessage.success(res.data.message);
                        fetchData();
                    } catch (e) { ElMessage.error('保存失败'); }
                };

                const controlGame = async (action) => {
                    try {
                        const res = await api.post(`/admin/game/control/${action}`);
                        ElMessage.success(res.data.message);
                        fetchData();
                    } catch (e) { ElMessage.error('操作失败'); }
                };

                const resetGame = async () => {
                    if (confirm('确定要重置比赛数据吗？这将清空所有队伍的分数、流水、提交记录和容器监控面板，将轮次清零（题目配置会保留）。此操作不可恢复！')) {
                        try {
                            const res = await api.post('/admin/game/reset');
                            ElMessage.success(res.data.message);
                            fetchData();
                        } catch (e) { ElMessage.error('重置失败'); }
                    }
                };

                const resetContainer = async (boxId) => {
                    try {
                        const res = await api.post(`/admin/containers/${boxId}/reset`);
                        ElMessage.success(res.data.message);
                        fetchData();
                    } catch (e) { ElMessage.error('重置失败'); }
                };

                const updateAdminPassword = async () => {
                    if (adminPasswordForm.value.new_password !== adminPasswordForm.value.confirm_password) {
                        ElMessage.error('两次输入的新密码不一致');
                        return;
                    }
                    if (!adminPasswordForm.value.new_password) {
                        ElMessage.error('新密码不能为空');
                        return;
                    }
                    try {
                        const res = await api.post('/admin/me/password', {
                            old_password: adminPasswordForm.value.old_password,
                            new_password: adminPasswordForm.value.new_password
                        });
                        ElMessage.success(res.data.message);
                        adminPasswordForm.value = { old_password: '', new_password: '', confirm_password: '' };
                        // 重新登录
                        logout();
                        ElMessage.warning('密码已修改，请重新登录');
                    } catch (e) {
                        ElMessage.error(e.response?.data?.detail || '密码修改失败');
                    }
                };

                // Announcement methods
                const editAnn = (ann) => {
                    isEditingAnn.value = true;
                    editingAnnId.value = ann.id;
                    newAnn.value = { title: ann.title, content: ann.content, is_visible: ann.is_visible };
                    showAnnModal.value = true;
                };

                const saveAnn = async () => {
                    try {
                        if (isEditingAnn.value) {
                            await api.put(`/admin/announcements/${editingAnnId.value}`, newAnn.value);
                            ElMessage.success('公告修改成功');
                        } else {
                            await api.post('/admin/announcements', newAnn.value);
                            ElMessage.success('公告发布成功');
                        }
                        showAnnModal.value = false;
                        handleAnnClose();
                        fetchData();
                    } catch (e) { ElMessage.error(isEditingAnn.value ? '修改失败' : '发布失败'); }
                };

                const deleteAnn = async (id) => {
                    if (confirm('确定删除该公告吗？')) {
                        try {
                            await api.delete(`/admin/announcements/${id}`);
                            ElMessage.success('删除成功');
                            fetchData();
                        } catch (e) { ElMessage.error('删除失败'); }
                    }
                };

                const toggleAnnVisibility = async (ann) => {
                    try {
                        await api.put(`/admin/announcements/${ann.id}`, { is_visible: ann.is_visible });
                        ElMessage.success('状态已更新');
                    } catch (e) { ElMessage.error('状态更新失败'); ann.is_visible = !ann.is_visible; }
                };

                const handleAnnClose = () => {
                    showAnnModal.value = false;
                    isEditingAnn.value = false;
                    editingAnnId.value = null;
                    newAnn.value = { title: '', content: '', is_visible: true };
                };

                const handleTeamClose = () => {
                    showTeamModal.value = false;
                    isEditingTeam.value = false;
                    editingTeamId.value = null;
                    newTeam.value = { name: '', password: '', avatar_url: '' };
                };

                const handleClose = () => {
                    showTeamModal.value = false;
                    newTeam.value = { name: '', password: '' };
                    showChalModal.value = false;
                    isEditingChal.value = false;
                    editingChalId.value = null;
                    newChal.value = { 
                        name: '', 
                        description: '', 
                        category: 'web',
                        chal_type: gameConfig.value.game_mode === 'awdp' ? 'awdp' : 'ctf_docker', 
                        attachment_url: '', 
                        attack_image: '', 
                        check_image: '', 
                        base_score: 500, 
                        min_score: 100, 
                        initial_defense_count: 10 
                    };
                };

                return {
                    token, currentTab, loginForm, doLogin, logout,
                    sysStatus, gameConfig, saveGameConfig, controlGame, resetGame,
                    teams, showTeamModal, isEditingTeam, editingTeamId, newTeam, createTeam, saveTeam, editTeam, deleteTeam, handleTeamClose, handleClose, handleTeamAvatarSuccess, handleTeamAvatarError,
                    challenges, showChalModal, isEditingChal, newChal, saveChal, deleteChal, toggleVisibility, editChal, handleAttachmentSuccess, handleAttachmentError,
                    containers, resetContainer, auditTab, scoreLogs, flagLogs,
                    adminPasswordForm, updateAdminPassword,
                    announcements, showAnnModal, isEditingAnn, newAnn, editAnn, saveAnn, deleteAnn, toggleAnnVisibility, handleAnnClose
                };
            }
        });

        // 注入深色弹窗覆盖
        const style = document.createElement('style');
        style.textContent = `
            .el-dialog { background-color: rgba(30, 41, 59, 0.95) !important; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 12px; }
            .el-dialog__title { color: #f8fafc !important; font-weight: bold; }
            .el-form-item__label { color: #94a3b8 !important; }
            .el-input__wrapper { background-color: rgba(15, 23, 42, 0.6) !important; box-shadow: 0 0 0 1px rgba(255,255,255,0.1) inset !important; }
            .el-input__inner { color: #f8fafc !important; }
            .el-input.is-disabled .el-input__inner { color: #94a3b8 !important; -webkit-text-fill-color: #94a3b8 !important; }
            .el-textarea__inner { background-color: rgba(15, 23, 42, 0.6) !important; color: #f8fafc !important; box-shadow: 0 0 0 1px rgba(255,255,255,0.1) inset !important; }
            
            /* Custom Tabs in Admin */
            .custom-tabs .el-tabs__item { color: #94a3b8 !important; }
            .custom-tabs .el-tabs__item.is-active { color: #3b82f6 !important; font-weight: bold; }
            .custom-tabs .el-tabs__nav-wrap::after { background-color: rgba(255,255,255,0.05) !important; }
        `;
        document.head.appendChild(style);

        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
